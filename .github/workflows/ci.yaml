name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: "ci-build-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: cache-tools
        name: Cache Tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: bin/
          key: ${{ runner.os }}-${{ hashFiles('Makefile') }}
      - name: "Generate Resource Definitions"
        run: |
          make generate
      - name: "Generate Manifests"
        run: |
          make manifests
      - name: "Build Binary"
        run: |
          make build
      - name: "Build Docker Image"
        run: |
          make docker-build

  linter:
    name: "Linter"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: "ci-linting-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: cache-tools
        name: Cache Tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: bin/
          key: ${{ runner.os }}-${{ hashFiles('Makefile') }}
      - name: "Run go fmt"
        run: |
          make fmt
      - name: "Run go vet"
        run: |
          make vet
      - name: "Run lint file headers"
        run: python3 .github/scripts/lint_file_headers.py
      - name: "Check for changes"
        run: "git status"

  tests:
    name: "Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: "ci-tests-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: cache-tools
        name: Cache Tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: bin/
          key: ${{ runner.os }}-${{ hashFiles('Makefile') }}
      - name: "Run Tests"
        run: |
          make test

  documentation:
    name: "Documentation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: "ci-documentation-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
      - run: pip3 install -r requirements.txt
      - run: mkdocs build -d build/site/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: site
          path: build/site/

